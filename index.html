      <button>🎲 Sorteggio coppie</button>

    <div class="match">C vs D
      <input id="c1"><input id="d1">
    </div>

    <div class="match">A vs C

    </div>

    <div class="match">B vs D
      <input id="b2"><input id="d2">
    </div>

    <div class="match">A vs D
      <input id="a3"><input id="d3">
    </div>

    <div class="match">B vs C
      <input id="b3"><input id="c3">
    </div>

    <button onclick="calc()">Aggiorna Classifica</button>
    <button onclick="resetAll()" style="background:#ef4444;color:white;">Reset</button>
  </div>

  <div class="card">
    <h3>📊 Classifica</h3>
    <ul id="standings" class="table"></ul>
  </div>
