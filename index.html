<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Torneo Padel</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

header {
  padding: 16px;
  text-align: center;
  background: linear-gradient(90deg,#22c55e,#06b6d4);
  font-weight: bold;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 12px;
}

.card {
  background: #1e293b;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 12px;
}

.match {
  margin-bottom: 12px;
}

input {
  width: 60px;
  text-align: center;
  border-radius: 8px;
  border: none;
  margin-left: 5px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

.secondary {
  background: #334155;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  display: flex;
  justify-content: space-between;
  padding: 6px;
}

.badge {
  background: #334155;
  padding: 4px 8px;
  border-radius: 999px;
}
</style>
</head>

<body>

<header>🏆 Torneo Padel</header>

<div class="container">

  <!-- NAV -->
  <div class="card">
    <button onclick="goDraw()">🎲 Vai al sorteggio</button>
  </div>

  <div class="card">
    <h3>🎾 Match</h3>
    <div id="matches"></div>

    <button onclick="calc()">📊 Aggiorna classifica</button>
  </div>

  <div class="card">
    <h3>📊 Classifica</h3>
    <ul id="standings"></ul>
  </div>

</div>

<script>

function goDraw() {
  window.location.href = "draw.html";
}

let teams = JSON.parse(localStorage.getItem("padel_teams") || "[]");

let matches = [
  [0,1],
  [2,3],
  [0,2],
  [1,3],
  [0,3],
  [1,2]
];

// 🚨 render solo se valido
if (!teams || teams.length !== 4) {
  document.getElementById("matches").innerHTML =
    "<p>⚠️ Nessun torneo trovato. Vai al sorteggio.</p>";
} else {
  render();
}

function render() {

  let html = "";

  matches.forEach((m, i) => {

    const a = teams[m[0]];
    const b = teams[m[1]];

    html += `
      <div class="match">
        <b>${a.name} vs ${b.name}</b><br>

        <input id="a${i}" placeholder="A">
        <input id="b${i}" placeholder="B">
      </div>
    `;
  });

  document.getElementById("matches").innerHTML = html;
}

function calc() {

  let points = {};
  let playedMatches = 0;

  teams.forEach(t => points[t.name] = 0);

  matches.forEach((m, i) => {

    let aVal = document.getElementById("a"+i).value;
    let bVal = document.getElementById("b"+i).value;

    // ❌ IGNORA MATCH NON GIOCATO
    if (aVal === "" || bVal === "") return;

    let a = parseInt(aVal);
    let b = parseInt(bVal);

    if (isNaN(a) || isNaN(b)) return;

    playedMatches++;

    const tA = teams[m[0]].name;
    const tB = teams[m[1]].name;

    if (a > b) {
      points[tA] += 2;
    } else if (b > a) {
      points[tB] += 2;
    } else {
      points[tA] += 1;
      points[tB] += 1;
    }
  });

  if (playedMatches === 0) {
    alert("Inserisci almeno un risultato");
    return;
  }

  let sorted = Object.entries(points)
    .sort((a,b) => b[1]-a[1]);

  document.getElementById("standings").innerHTML =
    sorted.map(t =>
      `<li><span>${t[0]}</span><span class="badge">${t[1]} pt</span></li>`
    ).join("");
}

</script>

</body>
</html>
