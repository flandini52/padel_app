<script>

let teams = [];

document.addEventListener("DOMContentLoaded", () => {

  teams = JSON.parse(localStorage.getItem("padel_teams") || "null");

  if (!teams || teams.length !== 4) {
    document.getElementById("matches").innerHTML =
      "<p>⚠️ Nessun torneo trovato. Vai prima su Sorteggio.</p>";
    return;
  }

  render();
});

let matches = [
  [0,1],
  [2,3],
  [0,2],
  [1,3],
  [0,3],
  [1,2]
];

function render() {

  let html = "";

  matches.forEach((m, i) => {

    let teamA = teams[m[0]];
    let teamB = teams[m[1]];

    html += `
      <div class="match">
        <b>${teamA.name} vs ${teamB.name}</b><br>

        <input id="a${i}" placeholder="A">
        <input id="b${i}" placeholder="B">
      </div>
    `;
  });

  document.getElementById("matches").innerHTML = html;
}

function calc() {

  let points = {};

  teams.forEach(t => points[t.name] = 0);

  matches.forEach((m, i) => {

    let a = parseInt(document.getElementById("a"+i).value) || 0;
    let b = parseInt(document.getElementById("b"+i).value) || 0;

    let tA = teams[m[0]].name;
    let tB = teams[m[1]].name;

    if (a > b) {
      points[tA] += 2;
    } else if (b > a) {
      points[tB] += 2;
    } else {
      points[tA] += 1;
      points[tB] += 1;
    }
  });

  let sorted = Object.entries(points)
    .sort((a,b) => b[1]-a[1]);

  document.getElementById("standings").innerHTML =
    sorted.map(t =>
      `<li><span>${t[0]}</span><span class="badge">${t[1]} pt</span></li>`
    ).join("");
}

</script>
