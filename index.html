<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Padel Tournament</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
  }

  header {
    padding: 16px;
    text-align: center;
    font-weight: bold;
    background: linear-gradient(90deg,#22c55e,#06b6d4);
  }

  .container {
    max-width: 500px;
    margin: auto;
    padding: 12px;
  }

  .card {
    background: #1e293b;
    padding: 12px;
    border-radius: 16px;
    margin-bottom: 12px;
  }

  button {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    margin-top: 10px;
    font-weight: bold;
    background: #22c55e;
  }

  input {
    width: 50px;
    text-align: center;
    border-radius: 8px;
    border: none;
  }

  ul {
    list-style: none;
    padding: 0;
  }

  li {
    display: flex;
    justify-content: space-between;
    padding: 6px;
    border-bottom: 1px solid #334155;
  }

  .badge {
    background: #334155;
    padding: 4px 8px;
    border-radius: 999px;
  }
</style>
</head>

<body>

<header>🏆 Padel Tournament</header>

<div class="container">

  <div class="card">
    <h3>🎾 Match</h3>
    <div id="matches"></div>

    <button onclick="calc()">📊 Aggiorna classifica</button>
  </div>

  <div class="card">
    <h3>📊 Classifica</h3>
    <ul id="standings"></ul>
  </div>

</div>

<script>

let matchData = JSON.parse(localStorage.getItem("padel_teams") || "[]");

function renderMatches() {

  let html = "";

  matchData.forEach((m, idx) => {

    html += `
      <div style="margin-bottom:12px">
        <div><b>${m.teamA.join(" & ")} vs ${m.teamB.join(" & ")}</b></div>

        <div style="display:flex; gap:10px; margin-top:5px;">
          <input id="a${idx}" placeholder="A">
          <input id="b${idx}" placeholder="B">
        </div>
      </div>
    `;
  });

  document.getElementById("matches").innerHTML = html;
}

// 🧠 2 punti vittoria, 0 sconfitta
function calc() {

  let points = {};

  matchData.forEach((m, idx) => {

    let a = parseInt(document.getElementById("a"+idx).value) || 0;
    let b = parseInt(document.getElementById("b"+idx).value) || 0;

    m.teamA.forEach(p => points[p] = points[p] || 0);
    m.teamB.forEach(p => points[p] = points[p] || 0);

    if (a > b) {
      m.teamA.forEach(p => points[p] += 2);
    } else if (b > a) {
      m.teamB.forEach(p => points[p] += 2);
    }
  });

  let sorted = Object.entries(points)
    .sort((a,b) => b[1]-a[1]);

  document.getElementById("standings").innerHTML =
    sorted.map(p =>
      `<li><span>${p[0]}</span><span class="badge">${p[1]} pt</span></li>`
    ).join("");
}

renderMatches();

</script>

</body>
</html>
