<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Padel App</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

header {
  padding: 16px;
  text-align: center;
  background: linear-gradient(90deg,#22c55e,#06b6d4);
  font-weight: bold;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 12px;
}

.card {
  background: #1e293b;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 12px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  background: #22c55e;
  cursor: pointer;
}

.secondary {
  background: #334155;
}

.match {
  margin-bottom: 12px;
}

input {
  width: 60px;
  text-align: center;
  border-radius: 8px;
  border: none;
  margin-left: 5px;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  display:flex;
  justify-content:space-between;
  padding:6px;
}

.badge {
  background:#334155;
  padding:4px 8px;
  border-radius:999px;
}

/* 🏆 WINNER ANIMATION */
#winnerOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#winnerBox {
  background: #1e293b;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  animation: pop 0.4s ease forwards;
}

#winnerBox h1 {
  font-size: 28px;
  margin: 0;
}

#winnerBox p {
  font-size: 18px;
  margin-top: 10px;
  color: #22c55e;
}

@keyframes pop {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<header>🏆 Padel App</header>

<div class="container">

  <!-- MENU -->
  <div class="card" id="home">
    <h3>🎮 Menu</h3>
    <button onclick="goDraw()">🎲 Crea nuovo torneo</button>
    <button class="secondary" onclick="loadTournament()">📊 Continua torneo</button>
  </div>

  <!-- TOURNAMENT -->
  <div class="card" id="tournament" style="display:none;">
    <h3>🎾 Match</h3>
    <div id="matches"></div>

    <button onclick="calc()">📊 Aggiorna classifica</button>
    <button class="secondary" onclick="reset()">🔄 Nuovo torneo</button>
  </div>

  <!-- FINALS -->
  <div class="card" id="finalsBox" style="display:none;">
    <h3>🏆 Finali</h3>
    <div id="finals"></div>
  </div>

  <!-- CLASSIFICA -->
  <div class="card" id="standingsBox" style="display:none;">
    <h3>📊 Classifica</h3>
    <ul id="standings"></ul>
  </div>

</div>

<!-- WINNER OVERLAY -->
<div id="winnerOverlay">
  <div id="winnerBox">
    <h1>🏆 WINNER</h1>
    <p id="winnerName"></p>
  </div>
</div>

<script>

function goDraw() {
  window.location.href = "draw.html";
}

function reset() {
  localStorage.removeItem("padel_teams");
  location.reload();
}

let teams = JSON.parse(localStorage.getItem("padel_teams") || "[]");

let matches = [
  [0,1],
  [2,3],
  [0,2],
  [1,3],
  [0,3],
  [1,2]
];

function loadTournament() {

  teams = JSON.parse(localStorage.getItem("padel_teams") || "[]");

  if (!teams || teams.length !== 4) {
    alert("Nessun torneo trovato");
    return;
  }

  document.getElementById("home").style.display = "none";
  document.getElementById("tournament").style.display = "block";
  document.getElementById("standingsBox").style.display = "block";

  render();
}

function render() {

  let html = "";

  matches.forEach((m, i) => {

    const a = teams[m[0]];
    const b = teams[m[1]];

    html += `
      <div class="match">
        <b>${a.name} vs ${b.name}</b><br>
        <input id="a${i}" placeholder="A">
        <input id="b${i}" placeholder="B">
      </div>
    `;
  });

  document.getElementById("matches").innerHTML = html;
}

function allPlayed() {
  return matches.every((_, i) => {
    let a = document.getElementById("a"+i).value;
    let b = document.getElementById("b"+i).value;
    return a !== "" && b !== "";
  });
}

function calc() {

  let points = {};
  teams.forEach(t => points[t.name] = 0);

  matches.forEach((m, i) => {

    let aVal = document.getElementById("a"+i).value;
    let bVal = document.getElementById("b"+i).value;

    if (aVal === "" || bVal === "") return;

    let a = parseInt(aVal);
    let b = parseInt(bVal);

    if (a > b) {
      points[teams[m[0]].name] += 2;
    } else if (b > a) {
      points[teams[m[1]].name] += 2;
    } else {
      points[teams[m[0]].name] += 1;
      points[teams[m[1]].name] += 1;
    }
  });

  let sorted = Object.entries(points)
    .sort((a,b) => b[1]-a[1]);

  document.getElementById("standings").innerHTML =
    sorted.map(t =>
      `<li><span>${t[0]}</span><span class="badge">${t[1]} pt</span></li>`
    ).join("");

  if (allPlayed()) {
    generateFinals(sorted);
  }
}

function generateFinals(sorted) {

  let a = sorted[0][0];
  let b = sorted[1][0];
  let c = sorted[2][0];
  let d = sorted[3][0];

  document.getElementById("finalsBox").style.display = "block";

  document.getElementById("finals").innerHTML = `
    <h4>🥇 Finale 1° - 2°</h4>
    ${a} vs ${b}<br>
    <input id="f1a"> <input id="f1b">

    <h4 style="margin-top:15px;">🥉 Finale 3° - 4°</h4>
    ${c} vs ${d}<br>
    <input id="f2a"> <input id="f2b">

    <button onclick="calcFinals('${a}','${b}','${c}','${d}')">
      🏆 Chiudi torneo
    </button>
  `;
}

function calcFinals(a,b,c,d) {

  let f1a = parseInt(document.getElementById("f1a").value);
  let f1b = parseInt(document.getElementById("f1b").value);

  let f2a = parseInt(document.getElementById("f2a").value);
  let f2b = parseInt(document.getElementById("f2b").value);

  let first, second, third, fourth;

  if (f1a > f1b) {
    first = a;
    second = b;
  } else {
    first = b;
    second = a;
  }

  if (f2a > f2b) {
    third = c;
    fourth = d;
  } else {
    third = d;
    fourth = c;
  }

  showWinner(first);
}

function showWinner(name) {

  document.getElementById("winnerName").innerText = name;
  document.getElementById("winnerOverlay").style.display = "flex";

  setTimeout(() => {
    document.getElementById("winnerOverlay").style.display = "none";
  }, 3000);
}

</script>

</body>
</html>
