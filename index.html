<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Torneo Padel</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

header {
  padding: 16px;
  text-align: center;
  background: linear-gradient(90deg,#22c55e,#06b6d4);
  font-weight: bold;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 12px;
}

.card {
  background: #1e293b;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 12px;
}

.match {
  margin-bottom: 10px;
}

input {
  width: 60px;
  text-align: center;
  border-radius: 8px;
  border: none;
  margin-left: 5px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  font-weight: bold;
}

ul { list-style:none; padding:0; }
li { display:flex; justify-content:space-between; padding:6px; }

.badge {
  background:#334155;
  padding:4px 8px;
  border-radius:999px;
}
</style>
</head>

<body>

<header>🏆 Torneo Padel</header>

<div class="container">

  <div class="card">
    <h3>🎾 Match</h3>
    <div id="matches"></div>
    <button onclick="calc()">📊 Aggiorna classifica</button>
  </div>

  <div class="card">
    <h3>📊 Classifica</h3>
    <ul id="standings"></ul>
  </div>

</div>

<script>

let teams = JSON.parse(localStorage.getItem("padel_teams"));

if (!teams || teams.length !== 4) {
  document.getElementById("matches").innerHTML =
    "<p>⚠️ Nessun torneo trovato. Vai prima su Sorteggio.</p>";
}
let matches = [
  [0,1],
  [2,3],
  [0,2],
  [1,3],
  [0,3],
  [1,2]
];

function render() {

  let html = "";

  matches.forEach((m, i) => {

    let teamA = teams[m[0]];
    let teamB = teams[m[1]];

    if (!teamA || !teamB) return;

    html += `
      <div class="match">
        <b>${teamA.name} vs ${teamB.name}</b><br>

        <input id="a${i}" placeholder="A">
        <input id="b${i}" placeholder="B">
      </div>
    `;
  });

  document.getElementById("matches").innerHTML = html;
}

function calc() {

  let points = {};

  teams.forEach(t => points[t.name] = 0);

  matches.forEach((m, i) => {

    let a = parseInt(document.getElementById("a"+i).value) || 0;
    let b = parseInt(document.getElementById("b"+i).value) || 0;

    let tA = teams[m[0]].name;
    let tB = teams[m[1]].name;

    if (a > b) {
      points[tA] += 2;
    } else if (b > a) {
      points[tB] += 2;
    } else {
      points[tA] += 1;
      points[tB] += 1;
    }
  });

  let sorted = Object.entries(points)
    .sort((a,b) => b[1]-a[1]);

  document.getElementById("standings").innerHTML =
    sorted.map(t =>
      `<li><span>${t[0]}</span><span class="badge">${t[1]} pt</span></li>`
    ).join("");
}

if (teams && teams.length === 4) {
  render();
}
</script>

</body>
</html>
