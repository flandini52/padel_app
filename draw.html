<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sorteggio Padel</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.card {
  background: #1e293b;
  max-width: 500px;
  margin: 20px auto;
  padding: 15px;
  border-radius: 12px;
}

textarea, input {
  width: 90%;
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
}

button {
  width: 90%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>🎲 Sorteggio Torneo Padel</h2>

<div class="card">
  <textarea id="players" placeholder="Inserisci 8 nomi separati da virgola"></textarea>
  <button onclick="draw()">Genera squadre</button>
</div>

<div class="card" id="result"></div>

<script>

let teams = [];

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

function draw() {

  let players = document.getElementById("players").value
    .split(",")
    .map(p => p.trim())
    .filter(Boolean);

  if (players.length !== 8) {
    alert("Devi inserire esattamente 8 giocatori");
    return;
  }

  players = shuffle(players);

  teams = [
    { players: [players[0], players[1]], name: "Team 1" },
    { players: [players[2], players[3]], name: "Team 2" },
    { players: [players[4], players[5]], name: "Team 3" },
    { players: [players[6], players[7]], name: "Team 4" }
  ];

  let html = "<h3>Squadre generate</h3>";

  teams.forEach((t, i) => {
    html += `
      <div>
        <b>${t.players.join(" & ")}</b><br>
        Nome squadra:
        <input id="t${i}" value="${t.name}">
      </div>
      <br>
    `;
  });

  html += `<button onclick="save()">💾 Conferma e vai al torneo</button>`;

  document.getElementById("result").innerHTML = html;
}

function save() {

  teams.forEach((t, i) => {
    t.name = document.getElementById("t"+i).value || `Team ${i+1}`;
  });

  localStorage.setItem("padel_teams", JSON.stringify(teams));
  window.location.href = "index.html";
}

</script>

</body>
</html>
