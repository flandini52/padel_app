<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sorteggio Padel</title>

<style>
  body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
  }

  .card {
    background: #1e293b;
    margin: 20px auto;
    padding: 15px;
    border-radius: 12px;
    max-width: 420px;
  }

  textarea {
    width: 90%;
    height: 100px;
    padding: 10px;
    border-radius: 10px;
  }

  button {
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: #22c55e;
    font-weight: bold;
    width: 90%;
  }
</style>
</head>

<body>

<h2>🎲 Sorteggio Padel</h2>

<div class="card">
  <textarea id="players" placeholder="Mario, Luca, Paolo, Marco..."></textarea>
  <button onclick="draw()">Estrai coppie</button>
</div>

<div class="card" id="result"></div>

<script>

let tempTeams = [];

function draw() {

  let players = document.getElementById("players").value
    .split(",")
    .map(p => p.trim())
    .filter(Boolean);

  if (players.length < 4) {
    alert("Servono almeno 4 giocatori");
    return;
  }

  players.sort(() => Math.random() - 0.5);

  tempTeams = [];

  let html = "";

  for (let i = 0; i < players.length; i += 4) {

    let teamA = [players[i], players[i+1]];
    let teamB = [players[i+2], players[i+3]];

    tempTeams.push({ teamA, teamB });

    html += `
      <div style="margin-bottom:10px">
        <b>${teamA.join(" & ")} vs ${teamB.join(" & ")}</b>
      </div>
    `;
  }

  html += `<button onclick="saveTeams()">💾 Salva e vai al torneo</button>`;

  document.getElementById("result").innerHTML = html;
}

function saveTeams() {
  localStorage.setItem("padel_teams", JSON.stringify(tempTeams));
  window.location.href = "index.html";
}

</script>

</body>
</html>
