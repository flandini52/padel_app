<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sorteggio Padel</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
  text-align: center;
}

header {
  padding: 16px;
  font-weight: bold;
  background: linear-gradient(90deg,#22c55e,#06b6d4);
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 12px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  margin-top: 12px;
}

textarea, input {
  width: 90%;
  padding: 10px;
  border-radius: 10px;
  margin-top: 8px;
  border: none;
}

button {
  width: 90%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  font-weight: bold;
  cursor: pointer;
}

.small {
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<header>🎲 Sorteggio Torneo Padel</header>

<div class="container">

  <div class="card">
    <h3>Inserisci 8 giocatori</h3>
    <textarea id="players" placeholder="Mario, Luca, Paolo, Marco, Anna, Sara, Gio, Ale"></textarea>

    <button onclick="generate()">🎲 Genera squadre</button>
  </div>

  <div class="card" id="result"></div>

</div>

<script>

let teams = [];

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

function generate() {

  let players = document.getElementById("players").value
    .split(",")
    .map(p => p.trim())
    .filter(Boolean);

  if (players.length !== 8) {
    alert("Devi inserire ESATTAMENTE 8 giocatori");
    return;
  }

  players = shuffle(players);

  teams = [
    { players: [players[0], players[1]], name: "Team 1" },
    { players: [players[2], players[3]], name: "Team 2" },
    { players: [players[4], players[5]], name: "Team 3" },
    { players: [players[6], players[7]], name: "Team 4" }
  ];

  let html = "<h3>🏆 Squadre generate</h3>";

  teams.forEach((t, i) => {
    html += `
      <div style="margin-bottom:12px">
        <b>${t.players.join(" & ")}</b><br>
        Nome squadra:<br>
        <input id="t${i}" value="${t.name}">
      </div>
    `;
  });

  html += `<button onclick="save()">💾 Conferma e vai al torneo</button>`;

  document.getElementById("result").innerHTML = html;
}

function save() {

  teams.forEach((t, i) => {
    let val = document.getElementById("t"+i).value;
    t.name = val || `Team ${i+1}`;
  });

  localStorage.setItem("padel_teams", JSON.stringify(teams));

  window.location.href = "index.html";
}

</script>

</body>
</html>
